<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>akist</title>
    <meta name="description" content="Minimal personal to do list." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>akist</h1>
          <p class="date-line">
            <span id="todayLabel"></span>
            <span class="date-separator">&middot;</span>
            <span id="timeLabel"></span>
          </p>
        </div>
        <div class="topbar-actions">
          <div id="searchWrap" class="search-shell">
            <button id="searchToggleBtn" class="search-toggle" type="button" aria-label="Open search">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="6.5" />
                <path d="M16 16l4.5 4.5" />
              </svg>
            </button>
            <input
              id="searchInput"
              class="search-input"
              type="search"
              placeholder="search"
              aria-label="Search tasks"
            />
          </div>
        </div>
      </header>

      <main class="main-column">
        <section class="panel composer">
          <form id="taskForm" class="task-form">
            <input
              id="taskTitle"
              name="title"
              type="text"
              placeholder="add a task"
              maxlength="120"
              required
            />
            <label id="taskDueDateShell" class="date-shell" aria-label="Due date">
              <span class="date-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M7 3.5v3M17 3.5v3M4.5 8.5h15M6 5.5h12a1.5 1.5 0 0 1 1.5 1.5v11A1.5 1.5 0 0 1 18 19.5H6A1.5 1.5 0 0 1 4.5 18V7A1.5 1.5 0 0 1 6 5.5Z" />
                </svg>
              </span>
              <span id="taskDueDateLabel" class="date-label"></span>
              <input id="taskDueDate" name="dueDate" class="date-native-input" type="date" aria-label="Due date" />
            </label>
            <button
              id="taskReminderToggleBtn"
              class="reminder-toggle is-hidden"
              type="button"
              aria-label="Edit reminder"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="7.25" />
                <path d="M12 8.5v4.2l2.8 1.7" />
              </svg>
            </button>
            <button class="button button-primary add-button" type="submit" aria-label="Add task">+</button>
            <div id="taskReminderEditor" class="reminder-editor is-hidden">
              <select id="taskReminderType" class="reminder-select" aria-label="Reminder timing">
                <option value="none">none</option>
                <option value="day-of">day of</option>
                <option value="days-before">days before</option>
                <option value="specific-date">specific day</option>
              </select>
              <input
                id="taskReminderDaysBefore"
                class="reminder-number is-hidden"
                type="number"
                min="1"
                max="30"
                value="1"
                aria-label="Days before"
              />
              <label id="taskReminderDateShell" class="date-shell reminder-date-shell is-hidden" aria-label="Reminder date">
                <span class="date-icon">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M7 3.5v3M17 3.5v3M4.5 8.5h15M6 5.5h12a1.5 1.5 0 0 1 1.5 1.5v11A1.5 1.5 0 0 1 18 19.5H6A1.5 1.5 0 0 1 4.5 18V7A1.5 1.5 0 0 1 6 5.5Z" />
                  </svg>
                </span>
                <span id="taskReminderDateLabel" class="date-label"></span>
                <input
                  id="taskReminderDate"
                  class="date-native-input"
                  type="date"
                  aria-label="Reminder date"
                />
              </label>
              <div class="reminder-time-group" aria-label="Reminder time">
                <select id="taskReminderHour" class="reminder-time-part reminder-hour" aria-label="Reminder hour"></select>
                <select id="taskReminderMinute" class="reminder-time-part reminder-minute" aria-label="Reminder minute"></select>
                <select id="taskReminderMeridiem" class="reminder-time-part reminder-meridiem" aria-label="Reminder am pm">
                  <option value="am">am</option>
                  <option value="pm">pm</option>
                </select>
              </div>
            </div>
          </form>
        </section>

        <section class="panel list-panel">
          <div id="taskList" class="task-list"></div>
        </section>

        <section class="completed-panel">
          <button id="toggleCompletedBtn" class="completed-toggle" type="button">
            completed
            <span id="completedCount">0</span>
          </button>
          <div id="completedList" class="task-list is-hidden"></div>
        </section>

        <div class="section-separator" aria-hidden="true">
          <span></span>
        </div>

        <section class="notes-panel">
          <button id="toggleNotesBtn" class="completed-toggle" type="button">
            notes
            <span id="notesCount">0</span>
          </button>
          <div id="notesBody" class="panel notes-body is-hidden">
            <form id="noteForm" class="note-form">
              <input
                id="noteTitle"
                name="title"
                type="text"
                placeholder="note title"
                maxlength="120"
                required
              />
              <textarea
                id="noteContent"
                name="content"
                placeholder="note details"
                maxlength="1000"
                rows="3"
                required
              ></textarea>
              <button class="button button-primary add-button" type="submit" aria-label="Add note">+</button>
            </form>
            <div id="noteList" class="task-list"></div>
          </div>
        </section>
      </main>
    </div>

    <template id="taskCardTemplate">
      <article class="task-card">
        <button class="check-button" data-action="toggle-done" type="button" aria-label="Toggle complete"></button>
        <div class="task-card-main">
          <div class="task-row">
            <h2 class="task-title"></h2>
            <div class="task-meta">
              <span class="task-date"></span>
            </div>
          </div>
          <form class="task-edit-form is-hidden">
            <input class="task-edit-title" type="text" maxlength="120" aria-label="Edit task title" />
            <div class="task-edit-control-row">
              <label class="date-shell task-edit-date-shell" aria-label="Edit due date">
                <span class="date-icon">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M7 3.5v3M17 3.5v3M4.5 8.5h15M6 5.5h12a1.5 1.5 0 0 1 1.5 1.5v11A1.5 1.5 0 0 1 18 19.5H6A1.5 1.5 0 0 1 4.5 18V7A1.5 1.5 0 0 1 6 5.5Z" />
                  </svg>
                </span>
                <span class="date-label task-edit-date-label"></span>
                <input class="task-edit-date-input date-native-input" type="date" aria-label="Edit due date" />
              </label>
              <button class="reminder-toggle task-edit-reminder-toggle is-hidden" data-action="toggle-edit-reminder" type="button" aria-label="Edit reminder">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="12" cy="12" r="7.25" />
                  <path d="M12 8.5v4.2l2.8 1.7" />
                </svg>
              </button>
            </div>
            <div class="task-edit-reminder-editor reminder-editor is-hidden">
              <select class="reminder-select task-edit-reminder-type" aria-label="Edit reminder timing">
                <option value="none">none</option>
                <option value="day-of">day of</option>
                <option value="days-before">days before</option>
                <option value="specific-date">specific day</option>
              </select>
              <input class="reminder-number task-edit-reminder-days-before is-hidden" type="number" min="1" max="30" value="1" aria-label="Days before" />
              <label class="date-shell reminder-date-shell task-edit-reminder-date-shell is-hidden" aria-label="Reminder date">
                <span class="date-icon">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M7 3.5v3M17 3.5v3M4.5 8.5h15M6 5.5h12a1.5 1.5 0 0 1 1.5 1.5v11A1.5 1.5 0 0 1 18 19.5H6A1.5 1.5 0 0 1 4.5 18V7A1.5 1.5 0 0 1 6 5.5Z" />
                  </svg>
                </span>
                <span class="date-label task-edit-reminder-date-label"></span>
                <input class="task-edit-reminder-date date-native-input" type="date" aria-label="Reminder date" />
              </label>
              <div class="reminder-time-group" aria-label="Edit reminder time">
                <select class="reminder-time-part reminder-hour task-edit-reminder-hour" aria-label="Edit reminder hour"></select>
                <select class="reminder-time-part reminder-minute task-edit-reminder-minute" aria-label="Edit reminder minute"></select>
                <select class="reminder-time-part reminder-meridiem task-edit-reminder-meridiem" aria-label="Edit reminder am pm">
                  <option value="am">am</option>
                  <option value="pm">pm</option>
                </select>
              </div>
            </div>
            <div class="task-edit-actions">
              <button class="task-save button button-primary" data-action="save-edit" type="submit">save</button>
              <button class="task-cancel task-action" data-action="cancel-edit" type="button">cancel</button>
            </div>
          </form>
        </div>
        <div class="task-actions">
          <button class="pin-button" data-action="toggle-pin" type="button" aria-label="Mark important">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 20.5c-4.5-2.9-7.5-5.8-7.5-9.3 0-2.2 1.7-3.9 3.9-3.9 1.4 0 2.8.7 3.6 1.9.8-1.2 2.2-1.9 3.6-1.9 2.2 0 3.9 1.7 3.9 3.9 0 3.5-3 6.4-7.5 9.3Z"
              />
            </svg>
          </button>
          <div class="task-menu-wrap">
            <button class="menu-button" data-action="toggle-menu" type="button" aria-label="Task options">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="5" r="1.8" />
                <circle cx="12" cy="12" r="1.8" />
                <circle cx="12" cy="19" r="1.8" />
              </svg>
            </button>
            <div class="task-menu is-hidden">
              <button class="task-menu-item" data-action="start-edit" type="button">edit</button>
              <button class="task-menu-item danger" data-action="delete-task" type="button">delete</button>
            </div>
          </div>
        </div>
      </article>
    </template>

    <template id="noteCardTemplate">
      <article class="note-card">
        <div class="note-card-main">
          <button class="note-toggle" data-action="toggle-note" type="button" aria-label="Open note">
            <h2 class="note-title"></h2>
          </button>
          <p class="note-content is-hidden"></p>
          <form class="note-edit-form is-hidden">
            <input class="note-edit-title" type="text" maxlength="120" aria-label="Edit note title" />
            <textarea class="note-edit-content" maxlength="1000" rows="4" aria-label="Edit note content"></textarea>
            <div class="task-edit-actions">
              <button class="task-save button button-primary" data-action="save-note" type="submit">save</button>
              <button class="task-cancel task-action" data-action="cancel-note-edit" type="button">cancel</button>
            </div>
          </form>
        </div>
        <div class="task-actions">
          <div class="task-menu-wrap">
            <button class="menu-button" data-action="toggle-note-menu" type="button" aria-label="Note options">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="5" r="1.8" />
                <circle cx="12" cy="12" r="1.8" />
                <circle cx="12" cy="19" r="1.8" />
              </svg>
            </button>
            <div class="task-menu is-hidden">
              <button class="task-menu-item" data-action="start-note-edit" type="button">edit</button>
              <button class="task-menu-item danger" data-action="delete-note" type="button">delete</button>
            </div>
          </div>
        </div>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
