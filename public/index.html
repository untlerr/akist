<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>akist</title>
    <meta name="description" content="Minimal personal to do list." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>akist</h1>
          <p class="date-line">
            <span id="todayLabel"></span>
            <span class="date-separator">&middot;</span>
            <span id="timeLabel"></span>
          </p>
        </div>
        <div class="topbar-actions">
          <div id="searchWrap" class="search-shell">
            <button id="searchToggleBtn" class="search-toggle" type="button" aria-label="Open search">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="6.5" />
                <path d="M16 16l4.5 4.5" />
              </svg>
            </button>
            <input
              id="searchInput"
              class="search-input"
              type="search"
              placeholder="search"
              aria-label="Search tasks"
            />
          </div>
        </div>
      </header>

      <main class="main-column">
        <section class="panel composer">
          <form id="taskForm" class="task-form">
            <input
              id="taskTitle"
              name="title"
              type="text"
              placeholder="add a task"
              maxlength="120"
              required
            />
            <label id="taskDueDateShell" class="date-shell" aria-label="Due date">
              <span class="date-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M7 3.5v3M17 3.5v3M4.5 8.5h15M6 5.5h12a1.5 1.5 0 0 1 1.5 1.5v11A1.5 1.5 0 0 1 18 19.5H6A1.5 1.5 0 0 1 4.5 18V7A1.5 1.5 0 0 1 6 5.5Z" />
                </svg>
              </span>
              <span id="taskDueDateLabel" class="date-label"></span>
              <input id="taskDueDate" name="dueDate" class="date-native-input" type="date" aria-label="Due date" />
            </label>
            <button class="button button-primary add-button" type="submit" aria-label="Add task">+</button>
          </form>
        </section>

        <section class="panel list-panel">
          <div id="taskList" class="task-list"></div>
        </section>

        <section class="completed-panel">
          <button id="toggleCompletedBtn" class="completed-toggle" type="button">
            completed
            <span id="completedCount">0</span>
          </button>
          <div id="completedList" class="task-list is-hidden"></div>
        </section>
      </main>
    </div>

    <template id="taskCardTemplate">
      <article class="task-card">
        <button class="check-button" data-action="toggle-done" type="button" aria-label="Toggle complete"></button>
        <div class="task-card-main">
          <div class="task-row">
            <h2 class="task-title"></h2>
            <div class="task-meta">
              <span class="task-pin"></span>
              <span class="task-date"></span>
            </div>
          </div>
          <form class="task-edit-form is-hidden">
            <input class="task-edit-title" type="text" maxlength="120" aria-label="Edit task title" />
            <label class="date-shell task-edit-date-shell" aria-label="Edit due date">
              <span class="date-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M7 3.5v3M17 3.5v3M4.5 8.5h15M6 5.5h12a1.5 1.5 0 0 1 1.5 1.5v11A1.5 1.5 0 0 1 18 19.5H6A1.5 1.5 0 0 1 4.5 18V7A1.5 1.5 0 0 1 6 5.5Z" />
                </svg>
              </span>
              <span class="date-label task-edit-date-label"></span>
              <input class="task-edit-date-input date-native-input" type="date" aria-label="Edit due date" />
            </label>
            <div class="task-edit-actions">
              <button class="task-save button button-primary" data-action="save-edit" type="submit">save</button>
              <button class="task-cancel task-action" data-action="cancel-edit" type="button">cancel</button>
            </div>
          </form>
        </div>
        <div class="task-actions">
          <button class="pin-button" data-action="toggle-pin" type="button" aria-label="Mark important">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 20.5c-4.5-2.9-7.5-5.8-7.5-9.3 0-2.2 1.7-3.9 3.9-3.9 1.4 0 2.8.7 3.6 1.9.8-1.2 2.2-1.9 3.6-1.9 2.2 0 3.9 1.7 3.9 3.9 0 3.5-3 6.4-7.5 9.3Z"
              />
            </svg>
          </button>
          <div class="task-menu-wrap">
            <button class="menu-button" data-action="toggle-menu" type="button" aria-label="Task options">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="5" r="1.8" />
                <circle cx="12" cy="12" r="1.8" />
                <circle cx="12" cy="19" r="1.8" />
              </svg>
            </button>
            <div class="task-menu is-hidden">
              <button class="task-menu-item" data-action="start-edit" type="button">edit</button>
              <button class="task-menu-item danger" data-action="delete-task" type="button">delete</button>
            </div>
          </div>
        </div>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
