<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>akist</title>
    <meta name="description" content="Minimal personal to do list." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>akist</h1>
          <p class="date-line">
            <span id="todayLabel"></span>
            <span class="date-separator">·</span>
            <span id="timeLabel"></span>
          </p>
        </div>
      </header>

      <main class="main-column">
        <section class="panel composer">
          <form id="taskForm" class="task-form">
            <input
              id="taskTitle"
              name="title"
              type="text"
              placeholder="Add a task"
              maxlength="120"
              required
            />
            <input id="taskDueDate" name="dueDate" type="date" aria-label="Due date" />
            <button class="button button-primary" type="submit">Add</button>
          </form>
        </section>

        <section class="toolbar">
          <input
            id="searchInput"
            type="search"
            placeholder="Search"
            aria-label="Search tasks"
          />
        </section>

        <section class="panel list-panel">
          <div id="taskList" class="task-list"></div>
        </section>

        <section class="completed-panel">
          <button id="toggleCompletedBtn" class="completed-toggle" type="button">
            Completed
            <span id="completedCount">0</span>
          </button>
          <div id="completedList" class="task-list is-hidden"></div>
        </section>
      </main>
    </div>

    <template id="taskCardTemplate">
      <article class="task-card">
        <button class="check-button" data-action="toggle-done" type="button" aria-label="Toggle complete"></button>
        <div class="task-card-main">
          <div class="task-row">
            <h2 class="task-title"></h2>
            <div class="task-meta">
              <span class="task-pin"></span>
              <span class="task-date"></span>
            </div>
          </div>
        </div>
        <div class="task-actions">
          <button class="task-action" data-action="toggle-pin" type="button">Pin</button>
          <button class="task-action danger" data-action="delete-task" type="button">Delete</button>
        </div>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
